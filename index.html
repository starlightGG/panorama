<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360° Panoramic Image Viewer</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.75);
            --text: #e0e0e0;
            --accent: #4da6ff;
            --accent-hover: #6bbdff;
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            cursor: grab;
            touch-action: none;
        }

        body.grabbing {
            cursor: grabbing;
        }
        body.loading-cursor {
            cursor: wait;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            transition: opacity 0.5s ease, visibility 0.5s ease;
            pointer-events: all;
        }
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading-text {
            color: var(--text);
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        #top-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 999px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
            pointer-events: all;
        }
        #top-bar .title {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            white-space: nowrap;
            opacity: 0.9;
        }
        #top-bar .badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 999px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 999px;
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: all;
        }
        .ctrl-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            transition: var(--transition);
            font-size: 18px;
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.93);
        }
        .ctrl-btn.active {
            color: var(--accent);
            background: rgba(77, 166, 255, 0.15);
        }
        .ctrl-btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .ctrl-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
            border-radius: 1px;
        }

        #file-input {
            display: none;
        }
        #url-input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 999px;
            padding: 5px 6px 5px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: all;
        }
        #url-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 13px;
            width: 180px;
            outline: none;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        #url-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        #url-load-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        #url-load-btn:hover {
            background: var(--accent-hover);
        }
        #url-load-btn:active {
            transform: scale(0.95);
        }

        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(20px);
            z-index: 20;
            background: rgba(30, 30, 30, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.4px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s ease;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) translateY(0);
        }
        #toast.error {
            border-color: #e05555;
            color: #faa;
        }

        #hint {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 0.4px;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        @media (max-width: 640px) {
            #controls {
                bottom: 16px;
                gap: 2px;
                padding: 4px 5px;
            }
            .ctrl-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            .ctrl-btn svg {
                width: 17px;
                height: 17px;
            }
            #top-bar {
                top: 10px;
                padding: 6px 14px;
                gap: 6px;
            }
            #top-bar .title {
                font-size: 11px;
            }
            #url-input-wrapper {
                padding: 4px 4px 4px 12px;
            }
            #url-input {
                width: 120px;
                font-size: 11px;
            }
            #url-load-btn {
                padding: 7px 12px;
                font-size: 11px;
            }
            #hint {
                bottom: 95px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading panorama...</div>
    </div>

    <div id="top-bar">
        <span class="title">360° Viewer</span>
        <span class="badge">PANORAMA</span>
    </div>

    <div id="hint">Drag to look around · Scroll to zoom · Drop an image anywhere</div>

    <div id="controls">
        <button class="ctrl-btn" id="btn-auto-rotate" title="Auto-Rotate (Space)">
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-invert-move" title="Invert both axes">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-invert-panorama" title="Invert Panorama (mirror left-right)">
            <svg viewBox="0 0 24 24">
                <line x1="2" y1="12" x2="22" y2="12" />
                <polyline points="6 8 2 12 6 16" />
                <polyline points="18 8 22 12 18 16" />
            </svg>
        </button>

        <div class="ctrl-divider"></div>

        <button class="ctrl-btn" id="btn-zoom-out" title="Zoom Out (−)">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-zoom-reset" title="Reset Zoom & View">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" stroke-dasharray="4 3"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-zoom-in" title="Zoom In (+)">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>

        <div class="ctrl-divider"></div>

        <button class="ctrl-btn" id="btn-load-file" title="Open Image File">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen (F)">
            <svg viewBox="0 0 24 24" id="fs-icon-expand"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            <svg viewBox="0 0 24 24" id="fs-icon-shrink" style="display:none;"><polyline points="4 8 4 3 9 3"/><polyline points="20 16 20 21 15 21"/><line x1="4" y1="3" x2="10" y2="9"/><line x1="20" y1="21" x2="14" y2="15"/></svg>
        </button>
    </div>

    <div style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:all;" id="url-bar">
        <div id="url-input-wrapper">
            <input type="text" id="url-input" placeholder="Paste equirectangular image URL...">
            <button id="url-load-btn">Load</button>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*">
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script>
        (function() {
            // DOM
            const container = document.getElementById('canvas-container');
            const loadingOverlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            const hintEl = document.getElementById('hint');
            const toast = document.getElementById('toast');
            const btnAutoRotate = document.getElementById('btn-auto-rotate');
            const btnInvertMove = document.getElementById('btn-invert-move');
            const btnInvertPanorama = document.getElementById('btn-invert-panorama');
            const btnZoomOut = document.getElementById('btn-zoom-out');
            const btnZoomIn = document.getElementById('btn-zoom-in');
            const btnZoomReset = document.getElementById('btn-zoom-reset');
            const btnLoadFile = document.getElementById('btn-load-file');
            const btnFullscreen = document.getElementById('btn-fullscreen');
            const fsIconExpand = document.getElementById('fs-icon-expand');
            const fsIconShrink = document.getElementById('fs-icon-shrink');
            const fileInput = document.getElementById('file-input');
            const urlInput = document.getElementById('url-input');
            const urlLoadBtn = document.getElementById('url-load-btn');
            const topBar = document.getElementById('top-bar');
            const controlsBar = document.getElementById('controls');
            const urlBar = document.getElementById('url-bar');

            // Constants
            const DEFAULT_FOV = 75;
            const MIN_FOV = 20;
            const MAX_FOV = 120;
            const FOV_STEP = 8;
            const AUTO_ROTATE_SPEED = 0.25;
            const INERTIA_DECAY = 0.92;
            const VELOCITY_THRESHOLD = 0.0005;
            const PITCH_LIMIT = Math.PI / 2 - 0.05;
            const DEFAULT_PANO_URL = 'https://threejs.org/examples/textures/2294472375_24a3b8ef46_o.jpg';

            // State
            let autoRotate = true;
            let invertMovement = false; // both axes inverted
            let panoramaInverted = false; // mirror left-right
            let yaw = 0;
            let pitch = -0.15;
            let targetFov = DEFAULT_FOV;
            let currentFov = DEFAULT_FOV;
            let velocityYaw = 0;
            let velocityPitch = 0;
            let isDragging = false;
            let isPinching = false;
            let pointerMoved = false;
            let pointerDownPos = { x: 0, y: 0 };
            let lastPointerX = 0;
            let lastPointerY = 0;
            let lastPointerTime = 0;
            let pinchStartDistance = 0;
            let pinchStartFov = DEFAULT_FOV;
            let activePointers = {};
            let currentTextureUrl = DEFAULT_PANO_URL;
            let textureLoadTimeout = null;
            let uiHidden = false;

            // Tap detection
            let lastTapTime = 0;
            let lastTapPos = { x: 0, y: 0 };

            // Three.js
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(currentFov, window.innerWidth / window.innerHeight, 0.5, 2000);
            camera.position.set(0, 0, 0);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            const sphereGeometry = new THREE.SphereGeometry(500, 128, 64);
            const sphereMaterial = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0xffffff });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            scene.add(sphere);

            // Procedural fallback
            function createProceduralTexture() {
                const width = 2048,
                    height = 1024;
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                const skyGrad = ctx.createLinearGradient(0, 0, 0, height * 0.55);
                skyGrad.addColorStop(0, '#1a3a6b');
                skyGrad.addColorStop(0.4, '#4a8ec2');
                skyGrad.addColorStop(0.75, '#a8d4f0');
                skyGrad.addColorStop(1, '#d4e8f5');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, width, height * 0.55);
                const sunGrad = ctx.createRadialGradient(width * 0.35, height * 0.30, 20, width * 0.35, height * 0.30, 280);
                sunGrad.addColorStop(0, 'rgba(255,240,210,0.9)');
                sunGrad.addColorStop(0.3, 'rgba(255,220,170,0.4)');
                sunGrad.addColorStop(0.7, 'rgba(255,180,100,0.05)');
                sunGrad.addColorStop(1, 'rgba(255,150,80,0)');
                ctx.fillStyle = sunGrad;
                ctx.fillRect(0, 0, width, height * 0.55);
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                for (let i = 0; i < 40; i++) {
                    ctx.beginPath();
                    ctx.ellipse(Math.random() * width, height * 0.12 + Math.random() * height * 0.25,
                        30 + Math.random() * 120, 10 + Math.random() * 35, Math.random() * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#3d5a6e';
                ctx.beginPath();
                ctx.moveTo(0, height * 0.55);
                for (let x = 0; x <= width; x += 15) {
                    const y = height * 0.48 + Math.sin(x * 0.004) * height * 0.06 +
                        Math.sin(x * 0.013 + 1.5) * height * 0.04 + Math.sin(x * 0.025) * height * 0.02;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height * 0.60);
                ctx.lineTo(0, height * 0.60);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#4a6d3c';
                ctx.beginPath();
                ctx.moveTo(0, height * 0.58);
                for (let x = 0; x <= width; x += 10) {
                    const y = height * 0.53 + Math.sin(x * 0.007 + 2) * height * 0.04 + Math.sin(x * 0.019) * height * 0.025;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height * 0.65);
                ctx.lineTo(0, height * 0.65);
                ctx.closePath();
                ctx.fill();
                const groundGrad = ctx.createLinearGradient(0, height * 0.55, 0, height);
                groundGrad.addColorStop(0, '#5a8a3c');
                groundGrad.addColorStop(0.3, '#4a7030');
                groundGrad.addColorStop(0.7, '#3a5525');
                groundGrad.addColorStop(1, '#2a3d1a');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, height * 0.55, width, height * 0.45);
                ctx.fillStyle = 'rgba(60,90,35,0.3)';
                for (let i = 0; i < 200; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * width, height * 0.58 + Math.random() * height * 0.4,
                        2 + Math.random() * 8, 0, Math.PI * 2);
                    ctx.fill();
                }
                const texture = new THREE.CanvasTexture(canvas);
                texture.colorSpace = THREE.SRGBColorSpace;
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                return texture;
            }

            function applyPanoramaInvert() {
                if (!sphereMaterial.map) return;
                if (panoramaInverted) {
                    sphereMaterial.map.repeat.x = -1;
                    sphereMaterial.map.offset.x = 1;
                } else {
                    sphereMaterial.map.repeat.x = 1;
                    sphereMaterial.map.offset.x = 0;
                }
                sphereMaterial.map.needsUpdate = true;
            }

            function loadTexture(url) {
                showLoading('Loading image...');
                currentTextureUrl = url;
                if (textureLoadTimeout) clearTimeout(textureLoadTimeout);
                let loaded = false;
                const loader = new THREE.TextureLoader();
                textureLoadTimeout = setTimeout(() => {
                    if (!loaded) {
                        sphereMaterial.map = createProceduralTexture();
                        sphereMaterial.needsUpdate = true;
                        applyPanoramaInvert();
                        hideLoading();
                        showToast('Timeout – fallback texture', true);
                    }
                }, 8000);
                loader.load(url,
                    (tex) => {
                        loaded = true;
                        if (textureLoadTimeout) clearTimeout(textureLoadTimeout);
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        sphereMaterial.map = tex;
                        sphereMaterial.needsUpdate = true;
                        applyPanoramaInvert();
                        hideLoading();
                        showToast('Panorama loaded');
                        setTimeout(() => { hintEl.style.opacity = '0'; }, 2000);
                    },
                    (prog) => {
                        if (prog.total > 0) loadingText.textContent = `Loading... ${Math.round(prog.loaded / prog.total * 100)}%`;
                    },
                    () => {
                        loaded = true;
                        if (textureLoadTimeout) clearTimeout(textureLoadTimeout);
                        sphereMaterial.map = createProceduralTexture();
                        sphereMaterial.needsUpdate = true;
                        applyPanoramaInvert();
                        hideLoading();
                        showToast('Failed – fallback texture', true);
                    }
                );
            }

            function loadTextureFromFile(file) {
                if (!file || !file.type.startsWith('image/')) { showToast('Select an image', true); return; }
                showLoading('Loading local image...');
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentTextureUrl = e.target.result;
                    new THREE.TextureLoader().load(e.target.result, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                        sphereMaterial.map = tex;
                        sphereMaterial.needsUpdate = true;
                        applyPanoramaInvert();
                        hideLoading();
                        showToast('Image loaded');
                        setTimeout(() => { hintEl.style.opacity = '0'; }, 2000);
                    });
                };
                reader.onerror = () => { hideLoading();
                    showToast('File read error', true); };
                reader.readAsDataURL(file);
            }

            function updateCamera() {
                pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
                yaw %= Math.PI * 2;
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                camera.fov = currentFov;
                camera.updateProjectionMatrix();
            }

            let lastTime = performance.now();

            function animate(timestamp) {
                requestAnimationFrame(animate);
                const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
                lastTime = timestamp;

                if (!isDragging && !isPinching) {
                    velocityYaw *= INERTIA_DECAY;
                    velocityPitch *= INERTIA_DECAY;
                    if (Math.abs(velocityYaw) < VELOCITY_THRESHOLD) velocityYaw = 0;
                    if (Math.abs(velocityPitch) < VELOCITY_THRESHOLD) velocityPitch = 0;
                    yaw += velocityYaw * dt;
                    pitch += velocityPitch * dt;
                }

                if (autoRotate && !isDragging && !isPinching) {
                    yaw += AUTO_ROTATE_SPEED * dt;
                }

                const zoomSpeed = 12;
                if (Math.abs(targetFov - currentFov) > 0.05) {
                    currentFov += (targetFov - currentFov) * Math.min(zoomSpeed * dt, 1);
                } else {
                    currentFov = targetFov;
                }

                updateCamera();
                renderer.render(scene, camera);
            }

            function getPointerCoords(pointerId) {
                return activePointers[pointerId] || null;
            }

            function updatePointerCoords(e) {
                const id = e.pointerId;
                if (activePointers[id]) {
                    activePointers[id].x = e.clientX;
                    activePointers[id].y = e.clientY;
                }
            }

            function calcPinchDistance() {
                const ids = Object.keys(activePointers);
                if (ids.length < 2) return null;
                const p1 = activePointers[ids[0]];
                const p2 = activePointers[ids[1]];
                return Math.hypot(p1.x - p2.x, p1.y - p2.y);
            }

            function onPointerDown(e) {
                if (e.target.closest('#controls') || e.target.closest('#url-bar') || e.target.closest('#top-bar') || e
                    .target.closest('#loading-overlay')) return;

                activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
                const count = Object.keys(activePointers).length;

                if (count === 2) {
                    isPinching = true;
                    isDragging = false;
                    pinchStartDistance = calcPinchDistance();
                    pinchStartFov = currentFov;
                    document.body.classList.remove('grabbing');
                    return;
                }

                if (count === 1) {
                    const pos = { x: e.clientX, y: e.clientY };
                    pointerDownPos = pos;
                    pointerMoved = false;
                    isDragging = false;
                    isPinching = false;
                    lastPointerX = pos.x;
                    lastPointerY = pos.y;
                    lastPointerTime = Date.now();
                    document.body.classList.add('grabbing');
                }
            }

            function onPointerMove(e) {
                updatePointerCoords(e);
                if (isPinching) {
                    const dist = calcPinchDistance();
                    if (dist) {
                        const scale = pinchStartDistance / Math.max(dist, 1);
                        targetFov = Math.max(MIN_FOV, Math.min(MAX_FOV, pinchStartFov * scale));
                        currentFov = targetFov;
                        updateCamera();
                    }
                    return;
                }

                if (Object.keys(activePointers).length !== 1) return;

                const pos = { x: e.clientX, y: e.clientY };
                const dx = pos.x - pointerDownPos.x;
                const dy = pos.y - pointerDownPos.y;
                if (!pointerMoved && Math.hypot(dx, dy) > 3) {
                    pointerMoved = true;
                    isDragging = true;
                }
                if (!isDragging) return;

                const moveX = pos.x - lastPointerX;
                const moveY = pos.y - lastPointerY;
                const dt = Math.max((Date.now() - lastPointerTime) / 1000, 0.001);
                const sensitivity = 0.003;

                const sign = invertMovement ? 1 : -1;
                yaw += sign * moveX * sensitivity;
                pitch += sign * moveY * sensitivity;

                velocityYaw = sign * moveX * sensitivity / dt;
                velocityPitch = sign * moveY * sensitivity / dt;
                const maxVel = 8;
                velocityYaw = Math.max(-maxVel, Math.min(maxVel, velocityYaw));
                velocityPitch = Math.max(-maxVel, Math.min(maxVel, velocityPitch));

                lastPointerX = pos.x;
                lastPointerY = pos.y;
                lastPointerTime = Date.now();
                updateCamera();
            }

            function onPointerUp(e) {
                delete activePointers[e.pointerId];
                const count = Object.keys(activePointers).length;

                if (isPinching && count < 2) {
                    isPinching = false;
                    targetFov = currentFov;
                    document.body.classList.remove('grabbing');
                    return;
                }

                if (count === 0) {
                    if (isDragging) {
                        isDragging = false;
                        document.body.classList.remove('grabbing');
                        const velMag = Math.hypot(velocityYaw, velocityPitch);
                        if (velMag < 0.3) { velocityYaw = 0;
                            velocityPitch = 0; }
                    } else if (!pointerMoved) {
                        const now = Date.now();
                        const pos = { x: e.clientX, y: e.clientY };
                        const dist = Math.hypot(pos.x - lastTapPos.x, pos.y - lastTapPos.y);
                        if (now - lastTapTime < 300 && dist < 25) {
                            handleDoubleTap();
                            lastTapTime = 0;
                        } else {
                            lastTapTime = now;
                            lastTapPos = pos;
                        }
                    }
                }
            }

            function onPointerLeave(e) {
                if (activePointers[e.pointerId]) {
                    onPointerUp(e);
                }
            }

            function handleDoubleTap() {
                if (uiHidden) {
                    showUI();
                    showToast('Controls visible');
                } 
            }

            function onWheel(e) {
                if (e.target.closest('#controls') || e.target.closest('#url-bar') || e.target.closest('#top-bar')) return;
                e.preventDefault();
                targetFov = Math.max(MIN_FOV, Math.min(MAX_FOV, targetFov + (e.deltaY > 0 ? FOV_STEP : -FOV_STEP)));
            }

            function toggleAutoRotate() { autoRotate = !autoRotate;
                btnAutoRotate.classList.toggle('active', autoRotate);
                showToast(`Auto-rotate: ${autoRotate ? 'ON' : 'OFF'}`); }

            function toggleInvertMovement() {
                invertMovement = !invertMovement;
                btnInvertMove.classList.toggle('active', invertMovement);
                btnInvertMove.title = invertMovement ? 'Invert both axes: ON' : 'Invert both axes: OFF';
                showToast(`Movement inverted: ${invertMovement ? 'ON' : 'OFF'}`);
            }

            function toggleInvertPanorama() {
                panoramaInverted = !panoramaInverted;
                btnInvertPanorama.classList.toggle('active', panoramaInverted);
                applyPanoramaInvert();
                showToast(`Panorama mirrored: ${panoramaInverted ? 'ON' : 'OFF'}`);
            }

            function hideUI() { topBar.style.display = 'none';
                controlsBar.style.display = 'none';
                urlBar.style.display = 'none';
                hintEl.style.display = 'none';
                uiHidden = true;
                showToast('Controls hidden – double‑tap to show'); }

            function showUI() { topBar.style.display = '';
                controlsBar.style.display = '';
                urlBar.style.display = '';
                hintEl.style.display = '';
                uiHidden = false; }

            function toggleFullscreen() {
                const fullscreenSupported = document.fullscreenEnabled || document.webkitFullscreenEnabled;
                if (!fullscreenSupported) {
                    uiHidden ? showUI() : hideUI();
                    return;
                }
                const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
                if (fsElement) {
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document).then(() => {
                        fsIconExpand.style.display = '';
                        fsIconShrink.style.display = 'none';
                    }).catch(() => {});
                } else {
                    const el = document.documentElement;
                    (el.requestFullscreen || el.webkitRequestFullscreen).call(el).then(() => {
                        fsIconExpand.style.display = 'none';
                        fsIconShrink.style.display = '';
                    }).catch(() => showToast('Fullscreen denied', true));
                }
            }

            function onFullscreenChange() { if (!(document.fullscreenElement || document.webkitFullscreenElement)) {
                    fsIconExpand.style.display = '';
                    fsIconShrink.style.display = 'none'; } }

            // Button listeners
            btnAutoRotate.addEventListener('click', toggleAutoRotate);
            btnInvertMove.addEventListener('click', toggleInvertMovement);
            btnInvertPanorama.addEventListener('click', toggleInvertPanorama);
            btnZoomOut.addEventListener('click', () => targetFov = Math.min(MAX_FOV, targetFov + FOV_STEP));
            btnZoomIn.addEventListener('click', () => targetFov = Math.max(MIN_FOV, targetFov - FOV_STEP));
            btnZoomReset.addEventListener('click', () => { targetFov = DEFAULT_FOV;
                yaw = 0;
                pitch = -0.15;
                velocityYaw = 0;
                velocityPitch = 0;
                updateCamera();
                showToast('View reset'); });
            btnLoadFile.addEventListener('click', () => fileInput.click());
            btnFullscreen.addEventListener('click', toggleFullscreen);
            fileInput.addEventListener('change', (e) => { if (e.target.files[0]) { loadTextureFromFile(e.target.files[
                    0]);
                    fileInput.value = ''; } });
            urlLoadBtn.addEventListener('click', () => { const u = urlInput.value.trim(); if (u) { loadTexture(u);
                    urlInput.blur(); } else showToast('Enter URL', true); });
            urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { const u = urlInput.value.trim(); if (
                    u) { loadTexture(u);
                    urlInput.blur(); } } });

            function onKeyDown(e) {
                if (document.activeElement === urlInput) return;
                switch (e.key.toLowerCase()) {
                    case ' ':
                        e.preventDefault();
                        toggleAutoRotate();
                        break;
                    case 'f':
                        toggleFullscreen();
                        break;
                    case '+':
                    case '=':
                        targetFov = Math.max(MIN_FOV, targetFov - FOV_STEP);
                        break;
                    case '-':
                        targetFov = Math.min(MAX_FOV, targetFov + FOV_STEP);
                        break;
                    case '0':
                        targetFov = DEFAULT_FOV;
                        yaw = 0;
                        pitch = -0.15;
                        velocityYaw = 0;
                        velocityPitch = 0;
                        updateCamera();
                        showToast('View reset');
                        break;
                    case 'arrowleft':
                        yaw -= 0.08;
                        velocityYaw = 0;
                        updateCamera();
                        break;
                    case 'arrowright':
                        yaw += 0.08;
                        velocityYaw = 0;
                        updateCamera();
                        break;
                    case 'arrowup':
                        pitch = Math.min(PITCH_LIMIT, pitch + 0.06);
                        velocityPitch = 0;
                        updateCamera();
                        break;
                    case 'arrowdown':
                        pitch = Math.max(-PITCH_LIMIT, pitch - 0.06);
                        velocityPitch = 0;
                        updateCamera();
                        break;
                }
            }

            function onDragOver(e) { e.preventDefault(); if (e.dataTransfer.types.includes('Files')) document.body.style
                    .cursor = 'copy'; }
            function onDragLeave() { document.body.style.cursor = isDragging ? 'grabbing' : 'grab'; }
            function onDrop(e) { e.preventDefault();
                const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) loadTextureFromFile(f);
                else showToast('Drop an image', true);
                document.body.style.cursor = 'grab'; }

            // Global events
            window.addEventListener('pointerdown', onPointerDown, { passive: false });
            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', onPointerUp, { passive: false });
            window.addEventListener('pointerleave', onPointerLeave, { passive: false });
            window.addEventListener('pointercancel', onPointerUp, { passive: false });
            window.addEventListener('wheel', onWheel, { passive: false });
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('dragover', onDragOver, { passive: false });
            window.addEventListener('dragleave', onDragLeave);
            window.addEventListener('drop', onDrop, { passive: false });
            document.addEventListener('fullscreenchange', onFullscreenChange);
            document.addEventListener('webkitfullscreenchange', onFullscreenChange);

            document.addEventListener('touchmove', (e) => { if (e.target.closest('#url-input')) return; if (e.touches && e
                    .touches.length > 1) e.preventDefault(); }, { passive: false });

            function onResize() { renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix(); }
            window.addEventListener('resize', onResize);
            window.addEventListener('orientationchange', () => setTimeout(onResize, 100));

            function init() {
                btnAutoRotate.classList.add('active');
                btnInvertMove.classList.remove('active');
                btnInvertPanorama.classList.remove('active');
                btnInvertMove.title = 'Invert both axes: OFF';
                btnInvertPanorama.title = 'Invert Panorama (mirror left-right)';
                loadTexture(DEFAULT_PANO_URL);
                lastTime = performance.now();
                requestAnimationFrame(animate);
                setTimeout(() => { if (hintEl.style.opacity !== '0') { hintEl.style.transition =
                        'opacity 2s ease';
                        hintEl.style.opacity = '0.3'; } }, 8000);
            }

            init();
        })();
    </script>
</body>
</html>
